version: '3.8'

services:
  # --- SERVICIO DE BASE DE DATOS (MySQL) ---
  database:
    image: mysql:8.1.0
    container_name: botica-db
    restart: always
    ports:
      - "3307:3306"
    # 👇 OBLIGA A MYSQL EN DOCKER A IGNORAR LAS MAYÚSCULAS DE LAS TABLAS (IGUAL QUE EN WINDOWS)
    command: --lower_case_table_names=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=gabriel17marzo
      - MYSQL_DATABASE=boticafarma
    volumes:
      - mysql_data:/var/lib/mysql
      # 👇 NUEVO: CARGA EL SCRIPT DE INICIALIZACIÓN AUTOMÁTICA PARA TUS COMPAÑEROS
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pgabriel17marzo"]
      interval: 5s
      timeout: 5s
      retries: 5

 # --- SERVICIO DEL BACKEND (Spring Boot) ---
  backend:
    build:
      context: ./BoticaFarma
      dockerfile: Dockerfile
    container_name: botica-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://database:3306/boticafarma?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=gabriel17marzo
      - PDF_DIRECTORY=/app/pdf
    volumes:
      - ./pdf:/app/pdf
      - ./BoticaFarma/src:/app/src
    depends_on:
      database:
        condition: service_healthy

  # --- SERVICIO DEL FRONTEND (React) ---
  frontend:
    build:
      context: ./boticafrontend/frontend-botica
      dockerfile: Dockerfile
    container_name: botica-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./boticafrontend/frontend-botica/src:/app/src
    depends_on:
      - backend

volumes:
  mysql_data: